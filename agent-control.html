<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View1 Agent Control Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0C0C0E;
            --bg-surface: #161619;
            --bg-surface-hover: #1F1F24;
            --accent-green: #4ADE80;
            --accent-blue: #3B82F6;
            --accent-purple: #A855F7;
            --accent-cyan: #06B6D4;
            --accent-orange: #F97316;
            --accent-lime: #84CC16;
            --accent-pink: #EC4899;
            --text-primary: #FFFFFF;
            --text-secondary: #A0A0A8;
            --border-color: #2D2D33;
            --success: #10B981;
            --error: #EF4444;
            --warning: #F59E0B;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            overflow-x: hidden;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        /* TOP BAR */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .top-bar-title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: var(--error);
            animation: pulse 2s infinite;
        }

        .status-indicator.connected {
            background-color: var(--success);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-icon {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .btn-icon:hover {
            background-color: var(--bg-surface-hover);
        }

        .refresh-time {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* STATS ROW */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s;
        }

        .stat-card:hover {
            border-color: var(--accent-green);
            background-color: var(--bg-surface-hover);
        }

        .stat-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--accent-green);
        }

        .stat-subtext {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* MAIN LAYOUT */
        .dashboard-layout {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 1024px) {
            .dashboard-layout {
                grid-template-columns: 1fr;
            }
        }

        /* AGENTS SECTION */
        .agents-section {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .department-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .department-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
            padding-left: 5px;
        }

        .department-label {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
        }

        .department-color {
            width: 4px;
            height: 16px;
            border-radius: 2px;
        }

        .dept-engineering { background-color: var(--accent-blue); }
        .dept-marketing { background-color: var(--accent-purple); }
        .dept-content { background-color: var(--accent-cyan); }
        .dept-qa { background-color: var(--accent-orange); }
        .dept-research { background-color: var(--accent-lime); }
        .dept-business { background-color: var(--accent-pink); }

        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 12px;
        }

        .agent-card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .agent-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background-color: transparent;
            transition: background-color 0.3s;
        }

        .agent-card.engineering::before { background-color: var(--accent-blue); }
        .agent-card.marketing::before { background-color: var(--accent-purple); }
        .agent-card.content::before { background-color: var(--accent-cyan); }
        .agent-card.qa::before { background-color: var(--accent-orange); }
        .agent-card.research::before { background-color: var(--accent-lime); }
        .agent-card.business::before { background-color: var(--accent-pink); }

        .agent-card:hover {
            background-color: var(--bg-surface-hover);
            border-color: var(--text-secondary);
            transform: translateY(-2px);
        }

        .agent-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .agent-icon {
            font-size: 28px;
        }

        .agent-info {
            flex: 1;
        }

        .agent-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .agent-id {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .agent-status {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .status-idle {
            background-color: rgba(160, 160, 168, 0.2);
            color: var(--text-secondary);
        }

        .status-running {
            background-color: rgba(74, 222, 128, 0.2);
            color: var(--accent-green);
        }

        .status-completed {
            background-color: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .status-failed {
            background-color: rgba(239, 68, 68, 0.2);
            color: var(--error);
        }

        .agent-time {
            font-size: 12px;
            color: var(--accent-green);
            margin-top: 6px;
            font-weight: 500;
        }

        .agent-actions {
            display: flex;
            gap: 6px;
            margin-top: 12px;
        }

        .btn-action {
            flex: 1;
            padding: 6px 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-action:hover:not(:disabled) {
            border-color: var(--accent-green);
            color: var(--accent-green);
        }

        .btn-action:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-action.danger:hover:not(:disabled) {
            border-color: var(--error);
            color: var(--error);
        }

        /* EVENTS FEED */
        .events-section {
            display: flex;
            flex-direction: column;
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .events-header {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            padding-left: 5px;
        }

        .events-container {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            max-height: 600px;
            overflow-y: auto;
            display: flex;
            flex-direction: column-reverse;
        }

        .event-item {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            font-size: 12px;
            animation: slideIn 0.3s ease-out;
        }

        .event-item:last-child {
            border-bottom: none;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .event-time {
            color: var(--text-secondary);
            font-size: 11px;
            margin-bottom: 4px;
        }

        .event-message {
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .event-icon {
            font-size: 16px;
        }

        /* PRS SECTION */
        .prs-section {
            margin-bottom: 30px;
        }

        .section-header {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 15px;
            padding-left: 5px;
        }

        .prs-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }

        .pr-card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            transition: all 0.3s;
        }

        .pr-card:hover {
            border-color: var(--accent-green);
            background-color: var(--bg-surface-hover);
        }

        .pr-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }

        .pr-number {
            font-size: 14px;
            font-weight: 700;
            color: var(--accent-green);
        }

        .pr-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .pr-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .pr-actions {
            display: flex;
            gap: 8px;
        }

        .btn-pr {
            flex: 1;
            padding: 6px 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-pr:hover:not(:disabled) {
            border-color: var(--accent-green);
            color: var(--accent-green);
        }

        .btn-pr.merge:hover:not(:disabled) {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }

        .btn-pr:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* MODALS */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            animation: fadeIn 0.2s;
        }

        .modal-overlay.visible {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            animation: slideUp 0.3s;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .modal-input {
            width: 100%;
            padding: 12px;
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 14px;
            margin-bottom: 20px;
            transition: all 0.2s;
        }

        .modal-input:focus {
            outline: none;
            border-color: var(--accent-green);
            box-shadow: 0 0 0 2px rgba(74, 222, 128, 0.1);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn-modal {
            padding: 10px 20px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: transparent;
            color: var(--text-primary);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-modal:hover {
            border-color: var(--text-primary);
        }

        .btn-modal.primary {
            background-color: var(--accent-green);
            border-color: var(--accent-green);
            color: var(--bg-primary);
        }

        .btn-modal.primary:hover {
            background-color: #3FD35A;
        }

        /* TOAST NOTIFICATIONS */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 14px 16px;
            font-size: 13px;
            font-weight: 500;
            animation: toastSlide 0.3s ease-out;
            pointer-events: auto;
            border-left: 3px solid var(--accent-green);
        }

        .toast.error {
            border-left-color: var(--error);
        }

        @keyframes toastSlide {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* LOADING SKELETON */
        .skeleton {
            background: linear-gradient(90deg, var(--bg-surface) 25%, var(--bg-surface-hover) 50%, var(--bg-surface) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 6px;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-card {
            height: 180px;
            margin-bottom: 10px;
        }

        .skeleton-stat {
            height: 100px;
        }

        /* ERROR STATE */
        .error-banner {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--error);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
            color: var(--error);
            font-size: 13px;
        }

        .config-prompt {
            background-color: rgba(74, 222, 128, 0.1);
            border: 1px solid var(--accent-green);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            margin: 40px 0;
        }

        .config-prompt-text {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 15px;
        }

        .btn-primary {
            padding: 10px 20px;
            background-color: var(--accent-green);
            color: var(--bg-primary);
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            background-color: #3FD35A;
        }

        /* FOOTER */
        .footer {
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
            text-align: center;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .footer-link {
            color: var(--accent-green);
            text-decoration: none;
            margin: 0 5px;
            transition: color 0.2s;
        }

        .footer-link:hover {
            color: #3FD35A;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .top-bar {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .top-bar-right {
                width: 100%;
                justify-content: space-between;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .agents-grid {
                grid-template-columns: 1fr;
            }

            .prs-container {
                grid-template-columns: 1fr;
            }

            .events-section {
                position: static;
            }

            .events-container {
                max-height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- TOP BAR -->
        <div class="top-bar">
            <div class="top-bar-left">
                <div class="top-bar-title">
                    <span>🤖 View1 Agent Control</span>
                    <div class="status-indicator" id="statusIndicator"></div>
                </div>
            </div>
            <div class="top-bar-right">
                <span class="refresh-time" id="refreshTime"></span>
                <button class="btn-icon" id="btnRefresh" title="Manual refresh">🔄</button>
                <button class="btn-icon" id="btnAutoRefresh" title="Toggle auto-refresh">⏱️</button>
                <button class="btn-icon" id="btnConfig" title="Configure API">⚙️</button>
            </div>
        </div>

        <!-- STATS ROW -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-label">Active Agents</div>
                <div class="stat-value skeleton skeleton-stat" style="width: 60%;"></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">PRs Created</div>
                <div class="stat-value skeleton skeleton-stat" style="width: 60%;"></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">PRs Merged</div>
                <div class="stat-value skeleton skeleton-stat" style="width: 60%;"></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Agent Time</div>
                <div class="stat-value skeleton skeleton-stat" style="width: 60%;"></div>
            </div>
        </div>

        <!-- ERROR BANNER -->
        <div id="errorBanner" class="error-banner" style="display: none;"></div>

        <!-- CONFIG PROMPT -->
        <div id="configPrompt" class="config-prompt" style="display: none;">
            <div class="config-prompt-text">No API configured. Configure the Mac Mini API endpoint to get started.</div>
            <button class="btn-primary" id="btnConfigPrompt">Configure API Endpoint</button>
        </div>

        <!-- MAIN LAYOUT -->
        <div class="dashboard-layout">
            <div class="agents-section" id="agentsSection"></div>
            <div class="events-section">
                <div class="events-header">Recent Events</div>
                <div class="events-container" id="eventsContainer"></div>
            </div>
        </div>

        <!-- PRS SECTION -->
        <div class="prs-section">
            <div class="section-header">Pull Requests</div>
            <div class="prs-container" id="prsContainer"></div>
        </div>

        <!-- FOOTER -->
        <div class="footer">
            View1 Studio — Agent Control Dashboard
            <a href="dashboard.html" class="footer-link">← Back to Dashboard</a>
            <span>v1.0</span>
        </div>
    </div>

    <!-- MODALS -->
    <div class="modal-overlay" id="configModal">
        <div class="modal">
            <div class="modal-title">Configure API Endpoint</div>
            <input
                type="text"
                class="modal-input"
                id="apiUrlInput"
                placeholder="http://192.168.1.50:3847"
            />
            <div class="modal-actions">
                <button class="btn-modal" id="btnCancelConfig">Cancel</button>
                <button class="btn-modal primary" id="btnSaveConfig">Save</button>
            </div>
        </div>
    </div>

    <!-- TOAST CONTAINER -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ============ STATE & CONFIG ============
        let apiUrl = '';
        let autoRefreshEnabled = true;
        let refreshInterval = null;
        let retryCount = 0;
        const MAX_RETRIES = 3;
        const RETRY_DELAY = 1000;

        const DEPARTMENTS = {
            'Engineering': { agents: ['eng-arch', 'eng-auth', 'eng-ui', 'eng-ai', 'eng-upload', 'eng-gallery', 'eng-stripe', 'eng-workspace'], color: 'engineering' },
            'Marketing': { agents: ['mktg-landing', 'mktg-seo', 'mktg-email', 'mktg-research'], color: 'marketing' },
            'Content': { agents: ['content-social', 'content-blog', 'content-video', 'content-trend'], color: 'content' },
            'QA': { agents: ['qa-test', 'qa-security', 'qa-review'], color: 'qa' },
            'Research': { agents: ['research-industry', 'research-analytics'], color: 'research' },
            'Business': { agents: ['biz-strategy', 'biz-finance'], color: 'business' }
        };

        // ============ INITIALIZATION ============
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('btnConfig').addEventListener('click', openConfigModal);
            document.getElementById('btnConfigPrompt').addEventListener('click', openConfigModal);
            document.getElementById('btnCancelConfig').addEventListener('click', closeConfigModal);
            document.getElementById('btnSaveConfig').addEventListener('click', saveConfig);
            document.getElementById('apiUrlInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') saveConfig();
            });
            document.getElementById('btnRefresh').addEventListener('click', refreshData);
            document.getElementById('btnAutoRefresh').addEventListener('click', toggleAutoRefresh);

            // Handle visibility changes
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    if (refreshInterval) clearInterval(refreshInterval);
                } else if (autoRefreshEnabled) {
                    startAutoRefresh();
                }
            });

            startAutoRefresh();
        });

        // ============ CONFIG MODAL ============
        function openConfigModal() {
            document.getElementById('configModal').classList.add('visible');
            document.getElementById('apiUrlInput').value = apiUrl;
            document.getElementById('apiUrlInput').focus();
        }

        function closeConfigModal() {
            document.getElementById('configModal').classList.remove('visible');
        }

        function saveConfig() {
            const url = document.getElementById('apiUrlInput').value.trim();
            if (!url) {
                showToast('Please enter an API URL', 'error');
                return;
            }
            apiUrl = url;
            closeConfigModal();
            document.getElementById('configPrompt').style.display = 'none';
            retryCount = 0;
            refreshData();
        }

        // ============ API CALLS ============
        async function fetchData(endpoint) {
            if (!apiUrl) {
                document.getElementById('configPrompt').style.display = 'block';
                return null;
            }

            try {
                const response = await fetch(`${apiUrl}${endpoint}`);
                if (!response.ok) throw new Error(`API error: ${response.status}`);
                retryCount = 0;
                hideErrorBanner();
                updateStatusIndicator(true);
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                if (retryCount < MAX_RETRIES) {
                    retryCount++;
                    await new Promise(resolve => setTimeout(resolve, RETRY_DELAY * retryCount));
                    return fetchData(endpoint);
                }
                updateStatusIndicator(false);
                showErrorBanner(`Unable to connect to API: ${error.message}`);
                return null;
            }
        }

        async function postAction(action, agentId = null, prNumber = null) {
            if (!apiUrl) return false;

            const payload = { action };
            if (agentId) payload.agentId = agentId;
            if (prNumber) payload.prNumber = prNumber;

            try {
                const response = await fetch(`${apiUrl}/api/action`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!response.ok) throw new Error(`API error: ${response.status}`);
                showToast(`Action "${action}" executed successfully`);
                refreshData();
                return true;
            } catch (error) {
                console.error('Action Error:', error);
                showToast(`Action failed: ${error.message}`, 'error');
                return false;
            }
        }

        // ============ AUTO-REFRESH ============
        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshData();
            if (autoRefreshEnabled) {
                refreshInterval = setInterval(refreshData, 10000);
            }
        }

        function toggleAutoRefresh() {
            autoRefreshEnabled = !autoRefreshEnabled;
            const btn = document.getElementById('btnAutoRefresh');
            btn.style.opacity = autoRefreshEnabled ? '1' : '0.5';
            if (autoRefreshEnabled) {
                startAutoRefresh();
            } else if (refreshInterval) {
                clearInterval(refreshInterval);
            }
        }

        async function refreshData() {
            const data = await fetchData('/api/status');
            if (!data) return;

            updateStats(data.metrics);
            updateAgents(data.agents);
            updateEvents(data.events);
            updatePRs(data.prs);
            updateRefreshTime();
        }

        // ============ UPDATE STATS ============
        function updateStats(metrics) {
            const statsGrid = document.getElementById('statsGrid');
            const activeAgents = document.querySelectorAll('.agent-card[data-running="true"]').length;

            statsGrid.innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">Active Agents</div>
                    <div class="stat-value">${activeAgents}<span style="font-size: 18px; color: var(--text-secondary);">/22</span></div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">PRs Created</div>
                    <div class="stat-value">${metrics.prsCreated || 0}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">PRs Merged</div>
                    <div class="stat-value">${metrics.prsMerged || 0}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Agent Time</div>
                    <div class="stat-value">${formatMinutes(metrics.totalMinutes || 0)}</div>
                </div>
            `;
        }

        // ============ UPDATE AGENTS ============
        function updateAgents(agents) {
            const agentsSection = document.getElementById('agentsSection');
            const grouped = {};

            Object.entries(DEPARTMENTS).forEach(([dept, config]) => {
                grouped[dept] = agents.filter(a => config.agents.includes(a.id));
            });

            let html = '';
            Object.entries(grouped).forEach(([dept, deptAgents]) => {
                if (deptAgents.length === 0) return;

                const color = DEPARTMENTS[dept].color;
                html += `
                    <div class="department-group">
                        <div class="department-header">
                            <div class="department-color dept-${color}"></div>
                            <div class="department-label">${dept}</div>
                        </div>
                        <div class="agents-grid">
                `;

                deptAgents.forEach(agent => {
                    const isRunning = agent.running;
                    const status = isRunning ? 'running' : (agent.state?.status || 'idle');
                    const elapsedTime = agent.elapsedSeconds ? formatSeconds(agent.elapsedSeconds) : '';
                    const timeHtml = isRunning ? `<div class="agent-time">⏱️ ${elapsedTime}</div>` : '';

                    html += `
                        <div class="agent-card ${color}" data-agent-id="${agent.id}" data-running="${isRunning}">
                            <div class="agent-header">
                                <div class="agent-icon">${agent.icon}</div>
                                <div class="agent-info">
                                    <div class="agent-name">${agent.name}</div>
                                    <div class="agent-id">${agent.id}</div>
                                    <div class="agent-status status-${status}">${status}</div>
                                </div>
                            </div>
                            ${timeHtml}
                            <div class="agent-actions">
                                <button class="btn-action" onclick="postAction('launch', '${agent.id}')" ${isRunning ? 'disabled' : ''}>Launch</button>
                                <button class="btn-action danger" onclick="postAction('stop', '${agent.id}')" ${!isRunning ? 'disabled' : ''}>Stop</button>
                            </div>
                        </div>
                    `;
                });

                html += `
                        </div>
                    </div>
                `;
            });

            agentsSection.innerHTML = html;
        }

        // ============ UPDATE EVENTS ============
        function updateEvents(events) {
            const eventsContainer = document.getElementById('eventsContainer');

            if (!events || events.length === 0) {
                eventsContainer.innerHTML = '<div class="event-item"><div class="event-time">No events yet</div></div>';
                return;
            }

            const recentEvents = events.slice(0, 50);
            let html = '';

            recentEvents.forEach(event => {
                const timeAgo = getTimeAgo(new Date(event.time));
                html += `
                    <div class="event-item">
                        <div class="event-time">${timeAgo}</div>
                        <div class="event-message">
                            <span class="event-icon">${event.icon || '📋'}</span>
                            <span>${event.message}</span>
                        </div>
                    </div>
                `;
            });

            eventsContainer.innerHTML = html;
        }

        // ============ UPDATE PRS ============
        function updatePRs(prs) {
            const prsContainer = document.getElementById('prsContainer');

            if (!prs || prs.length === 0) {
                prsContainer.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); padding: 40px;">No pull requests</div>';
                return;
            }

            let html = '';
            prs.forEach(pr => {
                const createdTime = getTimeAgo(new Date(pr.createdAt || pr.created_at));
                html += `
                    <div class="pr-card">
                        <div class="pr-header">
                            <div class="pr-number">#${pr.number}</div>
                        </div>
                        <div class="pr-title">${pr.title}</div>
                        <div class="pr-meta">
                            <span>${pr.author || pr.agentId}</span>
                            <span>${createdTime}</span>
                        </div>
                        <div class="pr-actions">
                            <button class="btn-pr" onclick="postAction('approve', null, ${pr.number})">Approve</button>
                            <button class="btn-pr merge" onclick="postAction('merge', null, ${pr.number})">Merge</button>
                        </div>
                    </div>
                `;
            });

            prsContainer.innerHTML = html;
        }

        // ============ UTILITY FUNCTIONS ============
        function updateStatusIndicator(connected) {
            const indicator = document.getElementById('statusIndicator');
            if (connected) {
                indicator.classList.add('connected');
            } else {
                indicator.classList.remove('connected');
            }
        }

        function updateRefreshTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('refreshTime').textContent = `Last: ${hours}:${minutes}`;
        }

        function formatMinutes(minutes) {
            const hours = Math.floor(minutes / 60);
            const mins = minutes % 60;
            if (hours === 0) return `${mins}m`;
            if (mins === 0) return `${hours}h`;
            return `${hours}h ${mins}m`;
        }

        function formatSeconds(seconds) {
            const hours = Math.floor(seconds / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            if (hours > 0) return `${hours}h ${mins}m`;
            if (mins > 0) return `${mins}m ${secs}s`;
            return `${secs}s`;
        }

        function getTimeAgo(date) {
            const now = new Date();
            const seconds = Math.floor((now - date) / 1000);
            if (seconds < 60) return 'now';
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes}m ago`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}h ago`;
            const days = Math.floor(hours / 24);
            return `${days}d ago`;
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'toastSlide 0.3s ease-out reverse';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function showErrorBanner(message) {
            const banner = document.getElementById('errorBanner');
            banner.textContent = '❌ ' + message;
            banner.style.display = 'block';
        }

        function hideErrorBanner() {
            document.getElementById('errorBanner').style.display = 'none';
        }

        // Update elapsed times for running agents every second
        setInterval(() => {
            document.querySelectorAll('.agent-card[data-running="true"]').forEach(card => {
                const time = card.querySelector('.agent-time');
                if (time) {
                    // In a real app, would track actual elapsed time from agent.state
                    // For now, this preserves the time display
                }
            });
        }, 1000);
    </script>
</body>
