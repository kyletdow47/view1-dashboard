<!DOCTYPE html>
<html lang="en" data-theme="zinc">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery — View1 Sort</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── Page-specific styles ── */

    /* Override .content padding — gallery needs tighter control */
    .content.gallery-content {
      padding: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Sub-header ── */
    .gallery-subheader {
      flex-shrink: 0;
      padding: 16px 28px 0;
      background-color: var(--surface-low);
      border-bottom: 1px solid var(--outline-v);
    }

    /* Row 1 */
    .gallery-subheader-row1 {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .gallery-shoot-title {
      font-weight: 800;
      font-size: 22px;
      color: var(--text);
      line-height: 1.2;
    }

    .gallery-shoot-meta {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 3px;
      font-weight: 400;
    }

    .gallery-row1-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
      flex-shrink: 0;
    }

    .dropdown-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: var(--radius-md);
      background-color: var(--surface-high);
      border: 1px solid var(--outline-v);
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      transition: background-color var(--t-micro), color var(--t-micro);
    }

    .dropdown-btn:hover {
      background-color: var(--surface-highest);
      color: var(--text);
    }

    /* Row 2 */
    .gallery-subheader-row2 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .category-pills {
      display: flex;
      align-items: center;
      gap: 0;
    }

    .category-pill {
      font-size: 12.5px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: color var(--t-micro);
      padding: 4px 10px;
      display: flex;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    }

    .category-pill:hover {
      color: var(--text-dim);
    }

    .category-pill.active {
      color: var(--primary);
    }

    .category-separator {
      font-size: 13px;
      color: var(--outline-v);
      line-height: 1;
      user-select: none;
    }

    .row2-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      border-radius: var(--radius-sm);
      background-color: var(--surface-high);
      border: 1px solid var(--outline-v);
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      transition: background-color var(--t-micro), color var(--t-micro), border-color var(--t-micro);
    }

    .toggle-btn:hover {
      background-color: var(--surface-highest);
      color: var(--text-dim);
    }

    .toggle-btn.on {
      background-color: color-mix(in srgb, var(--accent) 15%, transparent);
      border-color: color-mix(in srgb, var(--accent) 35%, transparent);
      color: var(--primary);
    }

    /* Row 3 */
    .gallery-subheader-row3 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 12px;
    }

    .gallery-search-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      background-color: var(--surface-high);
      border: 1px solid var(--outline-v);
      border-radius: var(--radius-md);
      padding: 6px 12px;
      min-width: 240px;
      color: var(--text-muted);
      font-size: 13px;
      transition: border-color var(--t-micro);
    }

    .gallery-search-wrap:focus-within {
      border-color: var(--accent);
    }

    .gallery-search-wrap input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      flex: 1;
      font-size: 13px;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    }

    .gallery-search-wrap input::placeholder {
      color: var(--text-muted);
    }

    .filter-tabs {
      display: flex;
      gap: 2px;
      background-color: var(--surface-high);
      border: 1px solid var(--outline-v);
      border-radius: var(--radius-md);
      padding: 3px;
    }

    .filter-tab {
      padding: 5px 14px;
      border-radius: 8px;
      font-size: 12.5px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border: none;
      background: transparent;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      transition: background-color var(--t-micro), color var(--t-micro);
    }

    .filter-tab:hover {
      color: var(--text-dim);
    }

    .filter-tab.active {
      background-color: var(--surface-highest);
      color: var(--text);
    }

    /* ── Gallery scroll area ── */
    .gallery-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 20px 28px 120px;
    }

    /* ── Group ── */
    .photo-group {
      margin-bottom: 28px;
    }

    .group-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      cursor: pointer;
      user-select: none;
    }

    .group-header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .group-chevron {
      width: 18px;
      height: 18px;
      color: var(--text-muted);
      transition: transform var(--t-micro);
      flex-shrink: 0;
    }

    .group-chevron.open {
      transform: rotate(90deg);
    }

    .group-name {
      font-weight: 700;
      font-size: 14px;
      color: var(--text);
    }

    .group-count {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      background-color: var(--surface-high);
      border: 1px solid var(--outline-v);
      padding: 2px 8px;
      border-radius: 999px;
    }

    /* ── Photo grid ── */
    .photo-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: flex-start;
    }

    .photo-thumb {
      height: 120px;
      border-radius: 6px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: transform var(--t-micro), box-shadow var(--t-micro);
    }

    .photo-thumb:hover {
      transform: scale(1.03);
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      z-index: 2;
    }

    .photo-thumb .thumb-bg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Selection checkbox overlay */
    .photo-thumb .thumb-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0);
      transition: background var(--t-micro);
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      padding: 6px;
    }

    .photo-thumb:hover .thumb-overlay {
      background: rgba(0,0,0,0.25);
    }

    .thumb-checkbox {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.7);
      background: rgba(0,0,0,0.3);
      opacity: 0;
      transition: opacity var(--t-micro);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .photo-thumb:hover .thumb-checkbox {
      opacity: 1;
    }

    .photo-thumb.selected .thumb-checkbox {
      opacity: 1;
      background: var(--accent);
      border-color: var(--accent);
    }

    .photo-thumb.selected .thumb-checkbox::after {
      content: '';
      width: 10px;
      height: 10px;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round' xmlns='http://www.w3.org/2000/svg'%3E%3Cpolyline points='20 6 9 17 4 12'/%3E%3C/svg%3E") center / contain no-repeat;
    }

    /* +N overflow badge */
    .thumb-more-badge {
      position: absolute;
      bottom: 7px;
      right: 7px;
      background: rgba(0,0,0,0.62);
      backdrop-filter: blur(6px);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 7px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.15);
      pointer-events: none;
    }

    /* ── Sticky bottom bar ── */
    .gallery-bottom-bar {
      position: fixed;
      bottom: 0;
      left: var(--sidebar-w);
      right: 0;
      height: 60px;
      background-color: var(--surface-low);
      border-top: 1px solid var(--outline-v);
      display: flex;
      align-items: center;
      padding: 0 28px;
      gap: 12px;
      z-index: 100;
      backdrop-filter: blur(8px);
    }

    .bottom-bar-count {
      font-size: 13.5px;
      font-weight: 600;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .bottom-bar-count span {
      color: var(--primary);
    }

    .bottom-bar-divider {
      width: 1px;
      height: 20px;
      background-color: var(--outline-v);
      flex-shrink: 0;
    }

    .bottom-bar-spacer {
      flex: 1;
    }

    .btn-approve {
      background-color: color-mix(in srgb, #4ade80 18%, transparent);
      color: #4ade80;
      border: 1px solid color-mix(in srgb, #4ade80 30%, transparent);
    }

    .btn-approve:hover {
      background-color: color-mix(in srgb, #4ade80 28%, transparent);
    }

    .btn-delete {
      background-color: color-mix(in srgb, #f87171 15%, transparent);
      color: #f87171;
      border: 1px solid color-mix(in srgb, #f87171 25%, transparent);
    }

    .btn-delete:hover {
      background-color: color-mix(in srgb, #f87171 25%, transparent);
    }
  </style>
</head>

<script>
  /* ── Theme Switcher ── */
  function setTheme(theme) {
    if (theme === 'warm') {
      document.documentElement.removeAttribute('data-theme');
    } else {
      document.documentElement.setAttribute('data-theme', theme);
    }
    ['warm', 'zinc', 'mono'].forEach(t => {
      document.getElementById('dot-' + t)?.classList.remove('active');
    });
    document.getElementById('dot-' + theme)?.classList.add('active');
    localStorage.setItem('v1-theme', theme);
  }

  /* ── Restore saved theme ── */
  (function() {
    const saved = localStorage.getItem('v1-theme');
    if (saved && saved !== 'zinc') setTheme(saved);
  })();

  /* ── Category pill switcher ── */
  function setCategoryPill(el) {
    document.querySelectorAll('.category-pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
  }

  /* ── Filter tab switcher ── */
  function setFilterTab(el) {
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
  }

  /* ── Toggle button (Faces / Dupes) ── */
  function toggleBtn(el) {
    el.classList.toggle('on');
  }

  /* ── Group expand/collapse ── */
  function toggleGroup(headerEl) {
    const chevron = headerEl.querySelector('.group-chevron');
    const body = headerEl.nextElementSibling;
    const isOpen = chevron.classList.contains('open');
    if (isOpen) {
      body.style.display = 'none';
      chevron.classList.remove('open');
    } else {
      body.style.display = 'flex';
      chevron.classList.add('open');
    }
  }

  /* ── Thumbnail selection ── */
  let selectedThumbs = new Set();

  function selectThumb(el) {
    const isSelected = el.classList.toggle('selected');
    if (isSelected) {
      selectedThumbs.add(el);
    } else {
      selectedThumbs.delete(el);
    }
    document.getElementById('selected-count').textContent = selectedThumbs.size;
  }

  /* ── Bulk actions (visual demo) ── */
  function bulkApprove() {
    if (selectedThumbs.size === 0) return;
    selectedThumbs.forEach(el => {
      el.classList.remove('selected');
      el.style.opacity = '0.45';
      el.style.transition = 'opacity 0.3s ease';
      setTimeout(() => { el.style.opacity = '1'; }, 600);
    });
    selectedThumbs.clear();
    document.getElementById('selected-count').textContent = '0';
  }

  function bulkDelete() {
    if (selectedThumbs.size === 0) return;
    selectedThumbs.forEach(el => {
      el.style.transform = 'scale(0.85)';
      el.style.opacity = '0';
      el.style.transition = 'all 0.25s ease';
      setTimeout(() => {
        el.style.transform = '';
        el.style.opacity = '1';
      }, 500);
    });
    selectedThumbs.clear();
    document.getElementById('selected-count').textContent = '0';
  }
</script>
