<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhotoSorter — Implementation Plan Flowchart</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0C0C0E;
  --surface: #161619;
  --surface-2: #1E1E22;
  --surface-3: #26262B;
  --border: #2A2A30;
  --border-hover: #3A3A42;
  --text: #E8E6E3;
  --text-dim: #8A8A95;
  --text-muted: #5A5A65;
  --accent: #4ADE80;
  --accent-dim: #22C55E;
  --accent-glow: rgba(74, 222, 128, 0.12);
  --warning: #FB923C;
  --danger: #F87171;
  --blue: #60A5FA;
  --purple: #A78BFA;
  --pink: #F472B6;
  --cyan: #22D3EE;
}

html { font-size: 14px; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(12, 12, 14, 0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 1rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header h1 {
  font-size: 1rem;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 0.02em;
}
.header .subtitle { color: var(--text-dim); font-size: 0.8rem; margin-left: 0.75rem; }

.controls {
  display: flex;
  gap: 0.5rem;
  align-items: center;
}
.controls label { font-size: 0.75rem; color: var(--text-dim); }
.toggle-btn {
  font-family: inherit;
  font-size: 0.75rem;
  padding: 0.35rem 0.75rem;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface-2);
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
}
.toggle-btn:hover { border-color: var(--border-hover); color: var(--text); }
.toggle-btn.active { background: var(--accent-glow); border-color: rgba(74,222,128,0.3); color: var(--accent); }

.legend {
  display: flex;
  gap: 1.25rem;
  padding: 0.75rem 2rem;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-wrap: wrap;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.7rem;
  color: var(--text-dim);
}
.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 3px;
}

.container {
  padding: 2rem;
  max-width: 1400px;
  margin: 0 auto;
}

/* Phase sections */
.phase {
  margin-bottom: 2.5rem;
}
.phase-header {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 1.25rem;
}
.phase-badge {
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 0.25rem 0.6rem;
  border-radius: 4px;
}
.phase-title {
  font-size: 1rem;
  font-weight: 600;
}
.phase-subtitle {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-left: auto;
}

/* Week lanes */
.week-lane {
  display: flex;
  gap: 0.75rem;
  flex-wrap: wrap;
  margin-bottom: 1.5rem;
  position: relative;
}
.week-label {
  writing-mode: vertical-lr;
  text-orientation: mixed;
  transform: rotate(180deg);
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  padding: 0.5rem 0;
  min-width: 24px;
  text-align: center;
  flex-shrink: 0;
}
.week-tasks {
  display: flex;
  gap: 0.6rem;
  flex-wrap: wrap;
  flex: 1;
}

/* Task nodes */
.task {
  position: relative;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.7rem 0.85rem;
  background: var(--surface);
  cursor: pointer;
  transition: all 0.2s;
  min-width: 160px;
  max-width: 220px;
  flex: 1 1 160px;
}
.task:hover {
  border-color: var(--border-hover);
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.task.highlighted {
  border-color: var(--accent);
  box-shadow: 0 0 20px rgba(74,222,128,0.15);
}
.task.dimmed { opacity: 0.3; }

.task-id {
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  margin-bottom: 0.3rem;
  display: flex;
  align-items: center;
  gap: 0.4rem;
}
.task-dot {
  width: 8px;
  height: 8px;
  border-radius: 2px;
  flex-shrink: 0;
}
.task-name {
  font-size: 0.8rem;
  font-weight: 500;
  line-height: 1.3;
  margin-bottom: 0.35rem;
}
.task-deps {
  font-size: 0.6rem;
  color: var(--text-muted);
  line-height: 1.4;
}
.task-deps span {
  color: var(--text-dim);
  cursor: pointer;
}
.task-deps span:hover { color: var(--accent); text-decoration: underline; }

.task-tags {
  display: flex;
  gap: 0.25rem;
  flex-wrap: wrap;
  margin-top: 0.4rem;
}
.task-tag {
  font-size: 0.55rem;
  padding: 0.1rem 0.35rem;
  border-radius: 3px;
  background: var(--surface-3);
  color: var(--text-muted);
  white-space: nowrap;
}

/* Category colors */
.cat-infra .task-dot, .cat-infra .phase-badge { background: var(--blue); }
.cat-auth .task-dot, .cat-auth .phase-badge { background: var(--purple); }
.cat-ai .task-dot, .cat-ai .phase-badge { background: var(--accent); }
.cat-ui .task-dot, .cat-ui .phase-badge { background: var(--cyan); }
.cat-payments .task-dot, .cat-payments .phase-badge { background: var(--warning); }
.cat-gallery .task-dot, .cat-gallery .phase-badge { background: var(--pink); }
.cat-email .task-dot, .cat-email .phase-badge { background: var(--danger); }
.cat-polish .task-dot, .cat-polish .phase-badge { background: var(--text-dim); }

.cat-infra .task-id { color: var(--blue); }
.cat-auth .task-id { color: var(--purple); }
.cat-ai .task-id { color: var(--accent); }
.cat-ui .task-id { color: var(--cyan); }
.cat-payments .task-id { color: var(--warning); }
.cat-gallery .task-id { color: var(--pink); }
.cat-email .task-id { color: var(--danger); }
.cat-polish .task-id { color: var(--text-dim); }

/* Dependency arrows (SVG overlay) */
.arrows-svg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 10;
}
.arrows-svg line {
  stroke: var(--border-hover);
  stroke-width: 1.5;
  stroke-dasharray: 4 3;
  opacity: 0.4;
}
.arrows-svg line.active {
  stroke: var(--accent);
  stroke-width: 2;
  stroke-dasharray: none;
  opacity: 0.8;
}

/* Detail panel */
.detail-panel {
  position: fixed;
  right: -420px;
  top: 0;
  width: 420px;
  height: 100vh;
  background: var(--surface);
  border-left: 1px solid var(--border);
  z-index: 200;
  transition: right 0.3s ease;
  overflow-y: auto;
  padding: 1.5rem;
}
.detail-panel.open { right: 0; }
.detail-close {
  position: absolute;
  top: 1rem;
  right: 1rem;
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 1.2rem;
  padding: 0.25rem;
}
.detail-close:hover { color: var(--text); }
.detail-panel h2 {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 0.25rem;
  padding-right: 2rem;
}
.detail-panel .detail-id {
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-bottom: 1rem;
}
.detail-section {
  margin-bottom: 1rem;
}
.detail-section h3 {
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  margin-bottom: 0.4rem;
}
.detail-section p, .detail-section ul {
  font-size: 0.8rem;
  color: var(--text-dim);
  line-height: 1.6;
}
.detail-section ul { padding-left: 1.2rem; }
.detail-section li { margin-bottom: 0.2rem; }
.detail-section code {
  font-family: 'JetBrains Mono', 'Fira Code', monospace;
  font-size: 0.7rem;
  background: var(--surface-2);
  padding: 0.1rem 0.35rem;
  border-radius: 3px;
  color: var(--accent);
}
.dep-link {
  display: inline-block;
  font-size: 0.7rem;
  padding: 0.15rem 0.45rem;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-dim);
  cursor: pointer;
  margin: 0.15rem;
  transition: all 0.15s;
}
.dep-link:hover { border-color: var(--accent); color: var(--accent); }

/* Connector lines between weeks */
.week-connector {
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
  margin: 0.5rem 0;
}

/* Responsive */
@media (max-width: 900px) {
  .task { min-width: 140px; max-width: none; flex: 1 1 140px; }
  .container { padding: 1rem; }
}
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:baseline;">
    <h1>PhotoSorter</h1>
    <span class="subtitle">Implementation Plan Flowchart</span>
  </div>
  <div class="controls">
    <label>Filter:</label>
    <button class="toggle-btn active" onclick="filterCategory('all')">All</button>
    <button class="toggle-btn" onclick="filterCategory('infra')">Infra</button>
    <button class="toggle-btn" onclick="filterCategory('auth')">Auth</button>
    <button class="toggle-btn" onclick="filterCategory('ai')">AI</button>
    <button class="toggle-btn" onclick="filterCategory('ui')">UI</button>
    <button class="toggle-btn" onclick="filterCategory('payments')">Payments</button>
    <button class="toggle-btn" onclick="filterCategory('gallery')">Gallery</button>
    <button class="toggle-btn" onclick="filterCategory('email')">Email</button>
    <button class="toggle-btn" onclick="filterCategory('polish')">Polish</button>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div> Infrastructure</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--purple)"></div> Auth / Onboarding</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div> AI / Classification</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--cyan)"></div> Workspace UI</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--warning)"></div> Payments / Stripe</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--pink)"></div> Gallery / Client</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--danger)"></div> Email / Notifications</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--text-dim)"></div> Polish / Launch</div>
  <div class="legend-item" style="margin-left:auto;font-size:0.65rem;color:var(--text-muted);">Click any task for details. Hover to highlight dependencies.</div>
</div>

<div class="container" id="container"></div>

<div class="detail-panel" id="detailPanel">
  <button class="detail-close" onclick="closeDetail()">&times;</button>
  <div id="detailContent"></div>
</div>

<script>
const TASKS = [
  // Week 1
  { id: "1.1", name: "Project Initialization", cat: "infra", week: 1, deps: [],
    files: ["package.json", "tsconfig.json", "tailwind.config.ts", ".env.local.example", "src/ directory skeleton"],
    desc: "Initialize Next.js 14+ with TypeScript, Tailwind, App Router, src directory. Install all dependencies: Zustand, Supabase, Transformers.js, tus-js-client, Stripe, Resend, JSZip.",
    tags: ["next.js", "typescript", "config"] },

  { id: "1.2", name: "Supabase Schema + RLS", cat: "infra", week: 1, deps: ["1.1"],
    files: ["supabase/migrations/001_initial_schema.sql", "supabase/migrations/002_rls_policies.sql"],
    desc: "Create all 13 tables (profiles, projects, media, project_clients, project_pricing, file_purchases, stripe_events, notifications, + Phase 2 stubs). RLS policies for photographer ownership and client access. Auto-create profile trigger on signup. Updated_at triggers. Indexes on hot paths.",
    tags: ["postgres", "rls", "13 tables"] },

  { id: "1.3", name: "Design System (Tailwind)", cat: "ui", week: 1, deps: ["1.1"],
    files: ["tailwind.config.ts", "src/app/globals.css", "src/components/ui/Button.tsx", "src/components/ui/Modal.tsx", "src/components/ui/Toast.tsx", "src/components/ui/Badge.tsx"],
    desc: "Port CSS custom properties from prototype to Tailwind theme: bg (#0C0C0E), surface, border, text, accent (#4ADE80), semantic colors. DM Sans + JetBrains Mono fonts. Build primitive UI components: Button (primary/secondary/ghost/danger), Modal, Toast, Badge.",
    tags: ["tailwind", "dark theme", "design tokens"] },

  { id: "1.4", name: "Auth Flow", cat: "auth", week: 1, deps: ["1.1", "1.2"],
    files: ["src/lib/supabase/client.ts", "src/lib/supabase/server.ts", "src/middleware.ts", "src/app/(auth)/login/page.tsx", "src/app/(auth)/signup/page.tsx"],
    desc: "Supabase Auth with @supabase/ssr. Browser client, server client, middleware for session refresh. Login/signup pages with email/password + Google/Apple OAuth. Middleware redirects: unauthenticated → /login, authenticated → /dashboard. Client OAuth: Google/Apple only (no password).",
    tags: ["supabase auth", "oauth", "middleware"] },

  { id: "1.5", name: "Onboarding Wizard", cat: "auth", week: 1, deps: ["1.4"],
    files: ["src/app/(auth)/onboarding/page.tsx", "src/components/onboarding/WizardSteps.tsx", "src/app/api/onboarding/scrape/route.ts"],
    desc: "4-step wizard: (1) Business name + avatar, (2) Preset selection, (3) Stripe Connect prompt (skip or start), (4) Create first project. Optional AI: website URL → Firecrawl + Claude Haiku → pre-fill business name, niche, theme. Sets profiles.onboarding_completed = true.",
    tags: ["wizard", "firecrawl", "ai onboarding"] },

  { id: "1.6", name: "Project CRUD", cat: "ui", week: 1, deps: ["1.2", "1.4"],
    files: ["src/app/(app)/dashboard/page.tsx", "src/stores/project.ts", "src/types/project.ts"],
    desc: "Dashboard page: project list with cards (name, preset badge, status, photo count). New project modal: name + preset selector. Zustand store for project state. Tier enforcement: Free limited to 3 active projects. RSC data fetching.",
    tags: ["zustand", "crud", "tier limits"] },

  { id: "1.7", name: "AI Classification Pipeline", cat: "ai", week: 1, deps: ["1.1"],
    files: ["src/lib/ai/classifier.worker.ts", "src/lib/ai/classifier.ts", "src/lib/ai/presets.ts", "src/lib/ai/quality.ts"],
    desc: "Replace MobileNet with SigLIP via Transformers.js in Web Worker. Zero-shot classification with text prompts per preset — eliminates keyword mapping. Add blur detection (Laplacian variance, ~5ms/image), duplicate detection (pHash), NIMA aesthetic scoring. Pipeline: upload complete → classify + quality score → update media row.",
    tags: ["siglip", "transformers.js", "web worker", "blur", "phash"] },

  // Week 2
  { id: "2.1", name: "Upload Pipeline", cat: "infra", week: 2, deps: ["1.2", "1.6"],
    files: ["src/lib/upload/queue.ts", "src/lib/upload/resumable.ts", "src/lib/upload/indexeddb.ts", "src/stores/upload.ts", "src/components/workspace/UploadZone.tsx", "src/components/workspace/UploadProgress.tsx"],
    desc: "Resumable chunked uploads via tus-js-client to Supabase Storage. Upload queue (1-3 concurrent). IndexedDB persistence: fileHash, progress, tusUploadUrl. File identity: SHA-256 of first 1MB + size + name. Duplicate detection: skip if hash matches existing media row. On complete: create media row, trigger AI worker, update storage_used.",
    tags: ["tus", "indexeddb", "resumable", "500mb max"] },

  { id: "2.2", name: "Workspace UI", cat: "ui", week: 2, deps: ["1.3", "1.6"],
    files: ["src/app/(app)/project/[id]/page.tsx", "src/app/(app)/layout.tsx", "src/components/workspace/Sidebar.tsx", "src/components/workspace/Toolbar.tsx", "src/components/workspace/CategorySection.tsx", "src/stores/media.ts"],
    desc: "App shell: sidebar (project list + upload progress) + header (logo, project name, publish/export, bell icon). Workspace: media grouped by category in collapsible sections. Zustand media store: files, selectedIds, orientationFilter, viewMode. Toolbar: grid/list toggle, orientation filter, search, batch rename.",
    tags: ["zustand", "layout", "sidebar", "toolbar"] },

  { id: "2.3", name: "Media Cards", cat: "ui", week: 2, deps: ["2.2"],
    files: ["src/components/workspace/MediaCard.tsx", "src/components/workspace/NoteEditor.tsx"],
    desc: "Port from prototype: thumbnail, filename overlay, type badge (VID/JPG), selection checkbox, star button, note button, rename button. Drag-and-drop reorder within and across categories. Multi-select: click toggle, shift+click range, ctrl+click add. Double-click preview.",
    tags: ["drag-drop", "multi-select", "port from prototype"] },

  { id: "2.4", name: "Batch Operations", cat: "ui", week: 2, deps: ["2.2"],
    files: ["src/components/workspace/MoveBar.tsx", "src/components/workspace/BatchRenameModal.tsx", "src/lib/utils/rename.ts"],
    desc: "MoveBar: appears when selection active. Move to category, change category, star, delete. Batch rename modal with template tokens: {property}, {category}, {n}, {nn}, {nnn}, {date}, {mls}, {agent}, {original}. Live preview of renamed files.",
    tags: ["batch rename", "move bar", "template tokens"] },

  { id: "2.5", name: "Orientation + View Modes", cat: "ui", week: 2, deps: ["2.2"],
    files: ["integrated into Toolbar.tsx and media store"],
    desc: "Orientation filter: all / landscape / portrait (ratio thresholds: >1.05 = landscape, <0.95 = portrait). Grid view: CSS grid with configurable column width. List view: table with thumbnail, name, category, orientation, size, date columns.",
    tags: ["filter", "grid", "list view"] },

  { id: "2.6", name: "Cloudflare Images", cat: "infra", week: 2, deps: ["2.1"],
    files: ["src/lib/media/cloudflare.ts"],
    desc: "URL builder for Cloudflare Images transforms: thumbnailUrl(path, width), watermarkedUrl(path), fullResUrl(path). Watermark configured as named variant in Cloudflare dashboard. Used by MediaCard for thumbnails, gallery for watermarked previews.",
    tags: ["cdn", "thumbnails", "watermark"] },

  { id: "2.7", name: "Storage Enforcement", cat: "infra", week: 2, deps: ["2.1"],
    files: ["integrated into upload queue"],
    desc: "Before upload: check profiles.storage_used + file.size <= tier limit (Free: 5GB, Pro: 100GB, Business: 500GB). On upload complete: UPDATE profiles SET storage_used = storage_used + file_size. On file delete: decrement. Overage shows upgrade prompt.",
    tags: ["tier limits", "storage tracking"] },

  // Week 3
  { id: "3.1", name: "Stripe Billing", cat: "payments", week: 3, deps: ["1.2"],
    files: ["src/lib/stripe/client.ts", "src/lib/stripe/checkout.ts", "src/app/(app)/settings/billing/page.tsx"],
    desc: "Stripe Products: Free (no product), Pro ($39/mo, ~$395/yr), Business (TBD), Custom (manual invoice). Checkout sessions with trial_period_days: 14. Billing page: current plan, storage usage, manage button → Stripe Customer Portal. Downgrade logic: on invoice.payment_failed → plan='free', published projects get 30-day grace.",
    tags: ["stripe billing", "$39/mo", "14-day trial", "4 tiers"] },

  { id: "3.2", name: "Stripe Connect", cat: "payments", week: 3, deps: ["3.1"],
    files: ["src/lib/stripe/connect.ts", "src/app/(app)/settings/connect/page.tsx"],
    desc: "Stripe Connect Standard: create account, generate onboarding link (expires — regenerate on each visit), check charges_enabled. Connect page: not connected → 'Connect Stripe' CTA, incomplete → 'Complete setup' with fresh link, complete → status + dashboard link. Gate: Pro/Business only (Free shows upgrade prompt).",
    tags: ["stripe connect", "standard accounts", "onboarding"] },

  { id: "3.3", name: "Webhook Handler", cat: "payments", week: 3, deps: ["1.2"],
    files: ["src/app/api/webhooks/stripe/route.ts", "src/lib/stripe/webhooks.ts"],
    desc: "Single endpoint for platform + Connect events. Signature verification (stripe-signature header). Idempotency: check stripe_events table before processing, log every event. 7 handlers: checkout.session.completed, invoice.paid, invoice.payment_failed, customer.subscription.deleted, account.updated, payment_intent.succeeded, charge.refunded.",
    tags: ["webhooks", "idempotency", "7 events"] },

  { id: "3.4", name: "Gallery Page", cat: "gallery", week: 3, deps: ["1.2", "2.6"],
    files: ["src/app/gallery/[id]/page.tsx", "src/components/gallery/GalleryGrid.tsx", "src/components/gallery/Lightbox.tsx"],
    desc: "Server component: fetch project, check gallery_public toggle. Public mode: watermarked thumbnails without auth. Private: require OAuth. 4 themes (dark/light/minimal/editorial) applied via CSS class. Category sections matching photographer's organization. Lightbox for full-res. Responsive for mobile.",
    tags: ["4 themes", "public/private", "lightbox", "responsive"] },

  { id: "3.5", name: "Access Resolver (RPC)", cat: "gallery", week: 3, deps: ["1.2"],
    files: ["supabase/migrations/003_access_resolver.sql"],
    desc: "Postgres function resolve_gallery_access(project_id, user_email) → JSONB { canView, canDownload, canRequestEdits, amountOwed, accessLevel }. Queries project_clients, project_pricing, file_purchases. Single source of truth — every gallery load and API call goes through this. Prevents payment bypass.",
    tags: ["postgres rpc", "access control", "single source of truth"] },

  { id: "3.6", name: "Gallery Paywall + Checkout", cat: "payments", week: 3, deps: ["3.2", "3.4", "3.5"],
    files: ["src/components/gallery/Paywall.tsx", "src/app/api/checkout/download/route.ts"],
    desc: "If amountOwed > 0: show paywall overlay with price + 'Pay to Download' button. Button creates Stripe Checkout session on photographer's connected account with application_fee_amount (7% Pro, 5% Business). On success: create file_purchases row, webhook updates payment status, refresh access resolver.",
    tags: ["paywall", "application fee", "checkout"] },

  { id: "3.7", name: "Email System", cat: "email", week: 3, deps: ["1.1"],

// Render
function render() {
  const container = document.getElementById('container');
  const weeks = {};
  TASKS.forEach(t => {
    if (!weeks[t.week]) weeks[t.week] = [];
    weeks[t.week].push(t);
  });

  const weekNames = {
    1: { title: "Week 1: Foundation", phase: "Phase 1" },
    2: { title: "Week 2: Workspace & Upload", phase: "Phase 1" },
    3: { title: "Week 3: Billing, Gallery & Email", phase: "Phase 1" },
    4: { title: "Week 4: Polish & Launch", phase: "Phase 1" },
    5: { title: "Weeks 5-6: Booking & Client Mgmt", phase: "Phase 2" },
    6: { title: "Weeks 5-6: Booking & Client Mgmt", phase: "Phase 2" },
    7: { title: "Weeks 7-8: Cart, Edits & Refine", phase: "Phase 2" },
    8: { title: "Weeks 7-8: Cart, Edits & Refine", phase: "Phase 2" },
  };

  // Group weeks into display groups
  const groups = [
    { weeks: [1], label: "Week 1: Foundation", phase: "Phase 1", phaseColor: "var(--accent)" },
    { weeks: [2], label: "Week 2: Workspace & Upload", phase: "Phase 1", phaseColor: "var(--accent)" },
    { weeks: [3], label: "Week 3: Billing, Gallery & Email", phase: "Phase 1", phaseColor: "var(--accent)" },
    { weeks: [4], label: "Week 4: Polish & Launch", phase: "Phase 1", phaseColor: "var(--accent)" },
    { weeks: [5, 6], label: "Weeks 5-6: Booking & Client Management", phase: "Phase 2", phaseColor: "var(--warning)" },
    { weeks: [7, 8], label: "Weeks 7-8: Cart, Edits & Refinements", phase: "Phase 2", phaseColor: "var(--warning)" },
  ];

  let html = '';
  let lastPhase = '';

  groups.forEach(group => {
    if (group.phase !== lastPhase) {
      html += `<div class="phase">
        <div class="phase-header">
          <span class="phase-badge" style="background:${group.phaseColor};color:#0C0C0E;">${group.phase}</span>
          <span class="phase-title" style="color:${group.phaseColor}">${group.phase === 'Phase 1' ? '3-4 weeks' : '4-6 weeks'}</span>
        </div>
      </div>`;
      lastPhase = group.phase;
    }

    const tasks = group.weeks.flatMap(w => weeks[w] || []);
    if (!tasks.length) return;

    html += `<div class="week-lane">
      <div class="week-label" style="color:${group.phaseColor}">${group.label.split(':')[0]}</div>
      <div class="week-tasks">`;

    tasks.forEach(t => {
      const depStr = t.deps.length
        ? `<div class="task-deps">Depends: ${t.deps.map(d => `<span onclick="event.stopPropagation();highlightTask('${d}')">${d}</span>`).join(', ')}</div>`
        : `<div class="task-deps" style="color:rgba(74,222,128,0.5);">No dependencies</div>`;

      const tags = t.tags.map(tag => `<span class="task-tag">${tag}</span>`).join('');

      html += `<div class="task cat-${t.cat}" data-id="${t.id}" data-cat="${t.cat}"
        onclick="openDetail('${t.id}')"
        onmouseenter="highlightDeps('${t.id}')"
        onmouseleave="clearHighlights()">
        <div class="task-id"><div class="task-dot"></div>${t.id}</div>
        <div class="task-name">${t.name}</div>
        ${depStr}
        <div class="task-tags">${tags}</div>
      </div>`;
    });

    html += `</div></div>`;
    html += `<div class="week-connector"></div>`;
  });

  container.innerHTML = html;
}

function highlightDeps(taskId) {
  const task = TASKS.find(t => t.id === taskId);
  if (!task) return;

  const allDeps = new Set();
  function collectDeps(id) {
    const t = TASKS.find(x => x.id === id);
    if (!t) return;
    t.deps.forEach(d => { allDeps.add(d); collectDeps(d); });
  }
  collectDeps(taskId);

  // Also find dependents (tasks that depend on this one)
  const dependents = new Set();
  function collectDependents(id) {
    TASKS.forEach(t => {
      if (t.deps.includes(id)) { dependents.add(t.id); collectDependents(t.id); }
    });
  }
  collectDependents(taskId);

  const related = new Set([taskId, ...allDeps, ...dependents]);

  document.querySelectorAll('.task').forEach(el => {
    const id = el.dataset.id;
    if (related.has(id)) {
      el.classList.add('highlighted');
      el.classList.remove('dimmed');
    } else {
      el.classList.add('dimmed');
      el.classList.remove('highlighted');
    }
  });
}

function clearHighlights() {
  document.querySelectorAll('.task').forEach(el => {
    el.classList.remove('highlighted', 'dimmed');
  });
}

function highlightTask(taskId) {
  clearHighlights();
  const el = document.querySelector(`.task[data-id="${taskId}"]`);
  if (el) {
    el.classList.add('highlighted');
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    setTimeout(() => el.classList.remove('highlighted'), 2000);
  }
}

function openDetail(taskId) {
  const task = TASKS.find(t => t.id === taskId);
  if (!task) return;

  const panel = document.getElementById('detailPanel');
  const content = document.getElementById('detailContent');

  const depLinks = task.deps.length
    ? task.deps.map(d => {
        const dep = TASKS.find(t => t.id === d);
        return `<span class="dep-link" onclick="openDetail('${d}')">${d} ${dep ? dep.name : ''}</span>`;
      }).join(' ')
    : '<span style="color:var(--accent);font-size:0.8rem;">None — can start immediately</span>';

  // Find dependents
  const dependents = TASKS.filter(t => t.deps.includes(taskId));
  const depByLinks = dependents.length
    ? dependents.map(d => `<span class="dep-link" onclick="openDetail('${d.id}')">${d.id} ${d.name}</span>`).join(' ')
    : '<span style="color:var(--text-muted);font-size:0.8rem;">None — terminal task</span>';

  content.innerHTML = `
    <h2>${task.name}</h2>
    <div class="detail-id">${task.id} · Week ${task.week} · ${task.cat}</div>

    <div class="detail-section">
      <h3>Description</h3>
      <p>${task.desc}</p>
    </div>

    <div class="detail-section">
      <h3>Depends On</h3>
      <div>${depLinks}</div>
    </div>

    <div class="detail-section">
      <h3>Blocks (depended on by)</h3>
      <div>${depByLinks}</div>
    </div>

    <div class="detail-section">
      <h3>Files</h3>
      <ul>${task.files.map(f => `<li><code>${f}</code></li>`).join('')}</ul>
    </div>

    <div class="detail-section">
      <h3>Tags</h3>
      <div class="task-tags">${task.tags.map(t => `<span class="task-tag" style="font-size:0.7rem;padding:0.15rem 0.5rem;">${t}</span>`).join('')}</div>
    </div>
  `;

  panel.classList.add('open');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
}

function filterCategory(cat) {
  document.querySelectorAll('.controls .toggle-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');

  document.querySelectorAll('.task').forEach(el => {
    if (cat === 'all' || el.dataset.cat === cat) {
      el.style.display = '';
      el.classList.remove('dimmed');
    } else {
      el.classList.add('dimmed');
    }
  });
}

// Close detail panel on escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDetail();
});

// Close detail on click outside
document.addEventListener('click', e => {
  const panel = document.getElementById('detailPanel');
  if (panel.classList.contains('open') && !panel.contains(e.target) && !e.target.closest('.task')) {
    closeDetail();
  }
});

render();
</script>
